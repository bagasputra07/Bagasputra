<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan OOP Interaktif</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    margin: 40px;
}

button {
    padding: 10px 20px;
    background-color: #2c3e50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #34495e;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    z-index: 1;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.6);
}

.modal-content {
    background-color: white;
    margin: 5% auto;
    padding: 20px;
    width: 80%;
    border-radius: 10px;
}

.close {
    float: right;
    font-size: 28px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Laporan OOP Dart - Versi Interaktif</h1>
<p>Nama: Bagas Putra Andeza</p>

<button onclick="openModal()">Lihat & Jalankan Contoh Dart</button>

<!-- Modal -->
<div id="dartModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2>Contoh Program Dart</h2>

        <!-- Embed DartPad -->
        <iframe 
            src="https://dartpad.dev/embed-flutter.html?id=example"
            width="100%" 
            height="500px"
            frameborder="0">
        </iframe>

        <p>
            Atau lihat di GitHub Gist:
            <a href="https://gist.github.com/USERNAME/GIST_ID" target="_blank">
                Buka Gist
            </a>
        </p>
    </div>
</div>

<script>
function openModal() {
    document.getElementById("dartModal").style.display = "block";
}

function closeModal() {
    document.getElementById("dartModal").style.display = "none";
}

window.onclick = function(event) {
    var modal = document.getElementById("dartModal");
    if (event.target == modal) {
        modal.style.display = "none";
    }
}
</script>

</body>
</html>
